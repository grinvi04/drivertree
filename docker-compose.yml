version: '3.8'

services:
  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: drivetree-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: drivetree
      POSTGRES_USER: drivetree_user
      POSTGRES_PASSWORD: drivetree_password123!
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:

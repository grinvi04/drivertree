name: CI

# ──────────────────────────────────────────────
#  브랜치별 역할 요약
#  feature/*  → CI 검증만 (lint + test + build)
#  develop    → CI 검증 → Railway Staging 자동 배포 (GitHub App)
#  main       → CI 검증 → Railway Production + Vercel Production 자동 배포 (GitHub App)
#
#  실제 배포는 Railway / Vercel GitHub App이 브랜치를 감지해 처리.
#  이 워크플로는 배포 전 품질 게이트 역할만 담당.
# ──────────────────────────────────────────────

on:
  push:
    branches: [main, develop, "feature/**", "fix/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# 동일 브랜치 push가 빠르게 연속 들어오면 진행 중인 워크플로 취소
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — lint · build · test
    runs-on: ubuntu-latest

    # develop / main 에서는 GitHub Environment 레이블을 붙여 배포 상태를 추적
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || github.ref == 'refs/heads/develop' && 'staging' || '' }}

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: drivetree_user
          POSTGRES_PASSWORD: drivetree_password123!
          POSTGRES_DB: drivetree
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U drivetree_user -d drivetree"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://drivetree_user:drivetree_password123!@localhost:5432/drivetree?schema=public
      JWT_SECRET: ci_jwt_secret_for_tests_only_not_for_production
      JWT_REFRESH_SECRET: ci_jwt_refresh_secret_for_tests_only_not_for_production
      GEMINI_API_KEY: ""
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: ci_admin_password
      NODE_ENV: test

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: backend/.nvmrc
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        # npm ci fails on optional wasm32/emnapi packages (npm 10.x + lock file bug).
        # npm install skips platform-incompatible optional packages gracefully.
        run: npm install

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma migrate deploy
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint:check

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

  frontend:
    name: Frontend — lint · build · e2e
    runs-on: ubuntu-latest

    environment: ${{ github.ref == 'refs/heads/main' && 'production' || github.ref == 'refs/heads/develop' && 'staging' || '' }}

    env:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_TELEMETRY_DISABLED: 1

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # npm ci fails on optional wasm32 packages (npm 10.x + lock file bug).
        # npm install skips platform-incompatible optional packages gracefully.
        run: npm install

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: E2E tests (Playwright)
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
